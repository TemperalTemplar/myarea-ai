<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Silex | MyArea AI</title>
  <link rel="icon" type="image/x-icon" href="https://apps.wrds361.com/static/favicon.ico">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Space+Mono:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.3/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap-icons/1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">

  <style>
    :root {
      --bg:          #0d0f14;
      --bg2:         #111520;
      --bg3:         #161b28;
      --border:      #1e2535;
      --border2:     #2a3448;
      --accent:      #e63946;
      --accent2:     #ff4d5a;
      --text:        #e8eaf0;
      --text-dim:    #8899bb;
      --text-muted:  #4a5a7a;
      --font-display:'Archivo Black', sans-serif;
      --font-mono:   'Space Mono', 'Courier New', monospace;
      --green:       #00d4a0;
      --yellow:      #f59e0b;
      --purple:      #7c3aed;
      --cyan:        #06b6d4;
    }
    [data-theme="light"] {
      --bg:#f0f2f5; --bg2:#ffffff; --bg3:#e8eaed;
      --border:#dde1e7; --border2:#c8cdd6;
      --text:#111520; --text-dim:#444c5e; --text-muted:#7a8499;
    }
    [data-theme="high-contrast"] {
      --bg:#000; --bg2:#0a0a0a; --bg3:#111;
      --border:#fff; --border2:#fff;
      --text:#fff; --text-dim:#ccc; --text-muted:#888;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; background: var(--bg); color: var(--text); font-family: var(--font-mono); font-size: 14px; line-height: 1.6; }
    body { display: flex; flex-direction: column; }
    a { color: var(--accent); text-decoration: none; }
    a:hover { color: var(--accent2); }
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: var(--bg2); }
    ::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 3px; }
    ::selection { background: var(--accent); color: #fff; }

    /* ── Nav ── */
    .ma-nav { background: var(--bg2); border-bottom: 1px solid var(--border2); position: sticky; top: 0; z-index: 1000; }
    .ma-nav-inner { display: flex; align-items: center; gap: 12px; max-width: 1200px; margin: 0 auto; padding: 0 16px; height: 52px; }
    .ma-logo { font-family: var(--font-mono); font-size: 16px; font-weight: 700; letter-spacing: 3px; color: var(--accent); text-decoration: none; white-space: nowrap; }
    .ma-logo span { color: var(--text-dim); }
    .ma-logo:hover { color: var(--accent2); text-decoration: none; }
    .ma-nav-links { display: flex; align-items: center; gap: 2px; flex: 1; overflow-x: auto; }
    .ma-nav-link { display: flex; align-items: center; gap: 6px; padding: 6px 10px; border-radius: 6px; font-size: 12px; color: var(--text-dim); text-decoration: none; white-space: nowrap; transition: all .15s; }
    .ma-nav-link:hover, .ma-nav-link.active { background: rgba(230,57,70,.08); color: var(--text); text-decoration: none; }
    .ma-nav-right { display: flex; align-items: center; gap: 6px; margin-left: auto; }
    .ma-icon-btn { background: transparent; border: 1px solid var(--border2); border-radius: 6px; width: 36px; height: 36px; cursor: pointer; display: flex; align-items: center; justify-content: center; color: var(--text-dim); font-size: 15px; text-decoration: none; transition: all .15s; font-family: var(--font-mono); }
    .ma-icon-btn:hover { border-color: var(--accent); color: var(--text); }

    /* ── Layout ── */
    #shell { display:flex; flex-direction:column; height:100vh; max-height:100vh; }

    /* ── Silex header card ── */
    #silex-header {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 16px;
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: 8px 8px 0 0;
      border-bottom: none;
      flex-shrink: 0;
    }
    #silex-mark {
      width: 10px; height: 10px;
      border-radius: 50%;
      background: var(--accent);
      box-shadow: 0 0 8px var(--accent);
      flex-shrink: 0;
      transition: box-shadow 0.3s;
    }
    #silex-mark.streaming { box-shadow: 0 0 16px var(--accent2); animation: pulse 0.8s infinite; }
    #silex-mark.offline   { background: var(--text-muted); box-shadow: none; }
    @keyframes pulse { 0%,100% { opacity:1; } 50% { opacity:0.4; } }

    #silex-title { font-size: 13px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--text); }
    #silex-title span { color: var(--accent); }
    #silex-meta { margin-left: auto; display: flex; align-items: center; gap: 12px; font-size: 11px; color: var(--text-muted); }
    #intent-badge { padding: 1px 7px; border: 1px solid var(--border2); border-radius: 4px; font-size: 10px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--text-muted); transition: all 0.2s; }
    #intent-badge.active { border-color: var(--accent); color: var(--accent); }

    /* ── Status bar ── */
    #statusbar {
      height: 26px;
      padding: 0 16px;
      background: var(--bg3);
      border: 1px solid var(--border);
      border-bottom: none;
      display: flex;
      align-items: center;
      gap: 14px;
      font-size: 10px;
      color: var(--text-muted);
      letter-spacing: 0.06em;
      flex-shrink: 0;
    }
    #statusbar .sep { color: var(--border2); }
    #status-text { color: var(--text-muted); }
    #status-text.active { color: var(--green); }
    #latency-val { margin-left: auto; }

    /* ── Feed ── */
    #feed {
      flex: 1;
      min-height: 0;
      overflow-y: auto;
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 14px;
      background: var(--bg2);
      border: 1px solid var(--border);
      border-bottom: none;
      scroll-behavior: smooth;
    }

    .msg { display: flex; flex-direction: column; gap: 4px; animation: fadein 0.15s ease; }
    @keyframes fadein { from { opacity:0; transform:translateY(4px); } to { opacity:1; transform:none; } }

    .msg-meta { font-size: 10px; letter-spacing: 0.08em; text-transform: uppercase; color: var(--text-muted); display: flex; align-items: center; gap: 8px; }
    .msg.user  .msg-meta { color: var(--text-muted); }
    .msg.silex .msg-meta { color: var(--accent); }

    .msg-body {
      background: var(--bg3);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 10px 14px;
      white-space: pre-wrap;
      word-break: break-word;
      line-height: 1.75;
      font-size: 13px;
    }
    .msg.user  .msg-body { border-color: var(--border); }
    .msg.silex .msg-body { border-left: 2px solid var(--accent); background: var(--bg2); }

    .cursor::after { content: '▌'; color: var(--accent); animation: blink 0.6s step-end infinite; }
    @keyframes blink { 50% { opacity:0; } }

    /* ── Composer ── */
    #composer {
      display: flex;
      gap: 0;
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: 0 0 8px 8px;
      overflow: hidden;
      flex-shrink: 0;
    }
    #prompt-prefix {
      padding: 10px 0 10px 14px;
      color: var(--accent);
      background: var(--bg3);
      border-right: 1px solid var(--border);
      font-family: var(--font-mono);
      font-size: 14px;
      flex-shrink: 0;
      user-select: none;
      display: flex;
      align-items: center;
    }
    #input {
      flex: 1;
      background: var(--bg3);
      border: none;
      color: var(--text);
      font-family: var(--font-mono);
      font-size: 13px;
      padding: 10px 14px;
      outline: none;
      resize: none;
      line-height: 1.5;
      min-height: 44px;
      max-height: 160px;
      overflow-y: auto;
    }
    #input::placeholder { color: var(--text-muted); }
    #send-btn {
      background: var(--accent);
      border: none;
      border-left: 1px solid var(--border);
      color: #fff;
      font-family: var(--font-mono);
      font-size: 11px;
      letter-spacing: 0.1em;
      padding: 0 20px;
      cursor: pointer;
      text-transform: uppercase;
      transition: background 0.15s;
      flex-shrink: 0;
    }
    #send-btn:hover:not(:disabled) { background: var(--accent2); }
    #send-btn:disabled { background: var(--text-muted); cursor: not-allowed; }

    /* ── Sys messages ── */
    .sys-msg { font-size: 11px; color: var(--text-muted); text-align: center; padding: 4px 0; letter-spacing: 0.08em; }
    .sys-msg.error { color: var(--accent); }


    /* ── Phase 7 sidebar ── */
    #workspace { display:flex; gap:0; height:calc(100vh - 52px); max-width:1200px; margin:0 auto; padding:20px 16px; }
    #sidebar { width:260px; flex-shrink:0; background:var(--bg2); border:1px solid var(--border); border-right:none; border-radius:8px 0 0 8px; display:flex; flex-direction:column; overflow:hidden; }
    #sidebar-head { padding:12px 14px; border-bottom:1px solid var(--border); display:flex; align-items:center; gap:8px; }
    #new-chat-btn { flex:1; background:var(--accent); color:#fff; border:none; border-radius:6px; padding:8px 10px; font-family:var(--font-mono); font-size:11px; letter-spacing:0.08em; text-transform:uppercase; cursor:pointer; transition:background .15s; }
    #new-chat-btn:hover { background:var(--accent2); }
    .side-section-label { font-size:9px; color:var(--text-muted); letter-spacing:2px; font-family:var(--font-mono); padding:12px 14px 6px; text-transform:uppercase; display:flex; align-items:center; justify-content:space-between; }
    .side-section-label button { background:transparent; border:1px solid var(--border2); color:var(--text-dim); border-radius:4px; width:20px; height:20px; cursor:pointer; font-size:12px; line-height:1; }
    .side-section-label button:hover { border-color:var(--accent); color:var(--accent); }
    #projects-list, #sessions-list { overflow-y:auto; }
    #sessions-list { flex:1; }
    .side-item { padding:8px 14px; cursor:pointer; border-left:2px solid transparent; display:flex; flex-direction:column; gap:2px; transition:background .12s; }
    .side-item:hover { background:var(--bg3); }
    .side-item.active { background:var(--bg3); border-left-color:var(--accent); }
    .side-item-title { font-size:12px; color:var(--text); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
    .side-item-meta { font-size:9px; color:var(--text-muted); letter-spacing:0.04em; }
    .side-item-row { display:flex; align-items:center; gap:6px; }
    .side-item-row .side-item-title { flex:1; }
    .side-item-actions { display:none; gap:4px; }
    .side-item:hover .side-item-actions { display:flex; }
    .side-item-actions button { background:transparent; border:none; color:var(--text-muted); cursor:pointer; font-size:11px; padding:0 2px; }
    .side-item-actions button:hover { color:var(--accent); }
    .proj-item { padding:7px 14px; cursor:pointer; font-size:12px; color:var(--text-dim); display:flex; align-items:center; gap:6px; border-left:2px solid transparent; }
    .proj-item:hover { background:var(--bg3); }
    .proj-item.active { color:var(--text); border-left-color:var(--cyan); background:var(--bg3); }
    .proj-item .dot { width:6px;height:6px;border-radius:50%;background:var(--cyan);flex-shrink:0; }
    #chatcol { flex:1; display:flex; flex-direction:column; min-width:0; }
    @media (max-width:760px){ #sidebar{display:none;} #workspace{padding:12px 8px;} }

    /* ── Scroll btn ── */
    #scroll-btn { display:none; position:fixed; bottom:80px; right:24px; background:var(--bg3); border:1px solid var(--border2); color:var(--text-dim); font-family:var(--font-mono); font-size:11px; padding:4px 10px; cursor:pointer; border-radius:4px; }
    #scroll-btn:hover { border-color:var(--accent); color:var(--accent); }
  </style>
</head>

<script>
// ── Launcher ──────────────────────────────────────────────────────────────
(function(){
  var btn=document.getElementById('ma-launcher-btn');
  var dd=document.getElementById('ma-launcher-dd');
  if(!btn||!dd)return;
  btn.addEventListener('click',function(e){e.stopPropagation();var o=dd.style.display==='block';dd.style.display=o?'none':'block';btn.setAttribute('aria-expanded',o?'false':'true');});
  document.addEventListener('click',function(){dd.style.display='none';btn.setAttribute('aria-expanded','false');});
  dd.addEventListener('click',function(e){e.stopPropagation();});
})();

// ── Theme ─────────────────────────────────────────────────────────────────
function toggleTheme(){
  var cur=document.documentElement.getAttribute('data-theme');
  var btn=document.getElementById('ma-theme-btn');
  if(cur==='light'){document.documentElement.removeAttribute('data-theme');localStorage.removeItem('ma_theme');if(btn)btn.innerHTML='&#9790;';}
  else{document.documentElement.setAttribute('data-theme','light');localStorage.setItem('ma_theme','light');if(btn)btn.innerHTML='&#9788;';}
}
function toggleContrast(){
  var cur=document.documentElement.getAttribute('data-theme');
  if(cur==='high-contrast'){document.documentElement.removeAttribute('data-theme');localStorage.removeItem('ma_theme');}
  else{document.documentElement.setAttribute('data-theme','high-contrast');localStorage.setItem('ma_theme','high-contrast');}
}
(function(){
  var t=localStorage.getItem('ma_theme');
  if(t)document.documentElement.setAttribute('data-theme',t);
  var btn=document.getElementById('ma-theme-btn');
  if(btn&&t==='light')btn.innerHTML='&#9788;';
})();

// ── Silex chat ────────────────────────────────────────────────────────────
(function(){
  var sessionId=null, streaming=false, streamEl=null;
  var feed=document.getElementById('feed');
  var input=document.getElementById('input');
  var sendBtn=document.getElementById('send-btn');
  var mark=document.getElementById('silex-mark');
  var statusTxt=document.getElementById('status-text');
  var modelLbl=document.getElementById('model-label');
  var sessLbl=document.getElementById('session-label');
  var latLbl=document.getElementById('latency-val');
  var intentBdg=document.getElementById('intent-badge');
  var scrollBtn=document.getElementById('scroll-btn');

  async function checkStatus(){
    try{
      var r=await fetch('/api/status');
      var d=await r.json();
      if(d.status==='ok'||d.status==='degraded'){
        mark.className='';
        statusTxt.textContent='online';statusTxt.className='active';
        modelLbl.textContent=d.models&&d.models.silex?d.models.silex.model:'—';
        sendBtn.disabled=false;
        clearFeed();
        appendSys('silex online — '+(d.models&&d.models.silex?d.models.silex.model:''));
        if(d.status==='degraded')appendSys('⚠ some models unavailable',true);
      }
    }catch(e){
      mark.className='offline';
      statusTxt.textContent='unreachable';statusTxt.className='';
      appendSys('cannot reach myarea-ai service',true);
    }
  }

  async function send(){
    var msg=input.value.trim();
    if(!msg||streaming)return;
    input.value='';resizeInput();
    appendMsg('user',msg);
    setStreaming(true);
    var body={message:msg,stream:true};
    if(sessionId)body.session_id=sessionId;
    /*proj-send*/try{var _p=window.SilexUI&&window.SilexUI.activeProject;if(_p)body.project=_p;}catch(e){}
    streamEl=appendMsg('silex','',true);
    var buffer='';
    try{
      var resp=await fetch('/api/chat',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)});
      // ── Thermal cooling gate: server says GPU too hot — queue + auto-retry ──
      if(resp.status===503){
        var cd=null; try{ cd=await resp.clone().json(); }catch(e){}
        if(cd&&cd.cooling){
          if(streamEl){ streamEl.parentNode&&streamEl.parentNode.removeChild(streamEl.parentNode); }
          appendSys('\u2744 Silex is cooling down (GPU '+cd.gpu_temp+'\u00b0C \u2265 '+cd.limit+'\u00b0C). Holding your message \u2014 will send when safe\u2026');
          setStreaming(false); streamEl=null;
          setTimeout(function(){ input.value=msg; send(); }, 8000);
          return;
        }
      }
      if(!resp.ok)throw new Error('HTTP '+resp.status);
      var reader=resp.body.getReader();
      var dec=new TextDecoder();
      var carry='';
      while(true){
        var _r=await reader.read();
        if(_r.done)break;
        carry+=dec.decode(_r.value,{stream:true});
        var parts=carry.split('\n\n');
        carry=parts.pop();
        for(var i=0;i<parts.length;i++){
          var block=parts[i];
          if(!block.trim())continue;
          var evtType='token',evtData='';
          var lines=block.split('\n');
          for(var j=0;j<lines.length;j++){
            if(lines[j].startsWith('event: '))evtType=lines[j].slice(7).trim();
            if(lines[j].startsWith('data: '))evtData=lines[j].slice(6);
          }
          if(evtType==='token'){
            buffer+=evtData.replace(/\\n/g,'\n');
            streamEl.textContent=buffer;
            scrollToBottom();
          } else if(evtType==='done'){
            try{
              var meta=JSON.parse(evtData);
              if(meta.session_id){sessionId=meta.session_id;sessLbl.textContent='session: '+sessionId.slice(0,8)+'…';}
              if(meta.latency_ms)latLbl.textContent=meta.latency_ms+'ms';
              if(meta.intent){intentBdg.textContent=meta.intent;intentBdg.className='active';}
              if(window.SilexChat)window.SilexChat.afterSend();
            }catch(e){}
          } else if(evtType==='error'){
            try{var err=JSON.parse(evtData);appendSys(err.error||'stream error',true);}catch(e){appendSys('stream error',true);}
          }
        }
      }
    }catch(e){appendSys('transmit error: '+e.message,true);}
    if(streamEl)streamEl.classList.remove('cursor');
    setStreaming(false);streamEl=null;scrollToBottom();
  }

  function appendMsg(role,text,cursor){
    var wrap=document.createElement('div');wrap.className='msg '+role;
    var meta=document.createElement('div');meta.className='msg-meta';meta.textContent=role==='user'?'you':'silex';wrap.appendChild(meta);
    var body=document.createElement('div');body.className='msg-body'+(cursor?' cursor':'');body.textContent=text;wrap.appendChild(body);
    feed.appendChild(wrap);scrollToBottom();return body;
  }
  function appendSys(text,isError){
    var el=document.createElement('div');el.className='sys-msg'+(isError?' error':'');el.textContent=text;feed.appendChild(el);scrollToBottom();
  }
  function clearFeed(){feed.innerHTML='';}
  function setStreaming(on){
    streaming=on;sendBtn.disabled=on;input.disabled=on;
    mark.className=on?'streaming':'';
  }
  function scrollToBottom(force){
    var atBottom=feed.scrollHeight-feed.scrollTop-feed.clientHeight<120;
    if(atBottom||force){feed.scrollTop=feed.scrollHeight;scrollBtn.style.display='none';}
    else{scrollBtn.style.display='block';}
  }
  function resizeInput(){input.style.height='auto';input.style.height=Math.min(input.scrollHeight,160)+'px';}

  sendBtn.addEventListener('click',send);
  input.addEventListener('keydown',function(e){if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();send();}});
  input.addEventListener('input',resizeInput);
  feed.addEventListener('scroll',function(){scrollToBottom();});
  scrollBtn.addEventListener('click',function(){scrollToBottom(true);});

  /*gpu-poll*/function pollGpu(){fetch('/api/status').then(function(r){return r.json();}).then(function(d){var gt=document.getElementById('gpu-temp');if(gt){gt.textContent=(d.gpu_temp!=null?('GPU '+d.gpu_temp+'\u00b0C'):'GPU —');gt.style.color=(d.gpu_temp!=null&&d.gpu_temp>=60)?'#e63946':(d.gpu_temp!=null&&d.gpu_temp>=52?'#f59e0b':'#00d4a0');}}).catch(function(){});}pollGpu();setInterval(pollGpu,5000);

  // ── Phase 7 bridge ──
  window.SilexChat = {
    newChat: function(){ sessionId=null; clearFeed(); appendSys('new conversation'); intentBdg.textContent='—'; intentBdg.className=''; sessLbl.textContent='session: —'; window.SilexUI && window.SilexUI.markActive(null); },
    loadSession: async function(sid){
      try{
        var r=await fetch('/api/sessions/'+sid); if(!r.ok)throw 0;
        var d=await r.json();
        sessionId=sid; clearFeed();
        (d.turns||[]).forEach(function(t){ appendMsg(t.role==='assistant'?'silex':'user', t.content); });
        sessLbl.textContent='session: '+sid.slice(0,8)+'…';
        window.SilexUI && window.SilexUI.markActive(sid);
        scrollToBottom(true);
      }catch(e){ appendSys('could not load conversation',true); }
    },
    getProject: function(){ return window.SilexUI ? window.SilexUI.activeProject : null; },
    afterSend: function(){ window.SilexUI && window.SilexUI.refresh(); }
  };
  // hook send() to attach project + refresh list after each exchange
  var _origSend=send;
  checkStatus();
})();

// User dropdown
(function(){
  fetch("/auth/me").then(function(r){return r.json();}).then(function(d){
    if(d.authenticated){
      var el=document.getElementById("user-display");
      if(el)el.textContent=d.user.username||d.user.name||"user";
      var em=document.getElementById("user-email");
      if(em)em.textContent=d.user.email||"";
      // Bring the AI page onto the platform notification bell.
      window.MA_USER = d.user.sub || "";
      if(window.MA_USER){
        var ls=document.createElement("script");
        ls.src="https://apps.wrds361.com/static/launcher.js";
        ls.onload=function(){
          // launcher.js mounts on DOMContentLoaded, which already fired by now —
          // dispatch a synthetic one so it builds the bell + 9-dot launcher.
          try{ document.dispatchEvent(new Event("DOMContentLoaded")); }catch(e){}
        };
        document.body.appendChild(ls);
      }
    }
  });
  var btn=document.getElementById("userBtn");
  var dd=document.getElementById("userDrop");
  if(btn&&dd){
    btn.addEventListener("click",function(e){e.stopPropagation();dd.style.display=dd.style.display==="block"?"none":"block";});
    document.addEventListener("click",function(e){if(btn&&!btn.contains(e.target))dd.style.display="none";});
  }
})();


// ── Phase 7: sessions + projects sidebar ────────────────────────────────────
(function(){
  var sessionsList=document.getElementById('sessions-list');
  var projectsList=document.getElementById('projects-list');
  var newChatBtn=document.getElementById('new-chat-btn');
  var newProjBtn=document.getElementById('new-proj-btn');
  var activeSid=null;
  var projectsCache=[];

  window.SilexUI={
    activeProject:null,
    markActive:function(sid){ activeSid=sid; renderSessionsActive(); },
    refresh:function(){ loadSessions(); }
  };

  function timeago(ts){
    if(!ts)return'';
    var s=Math.floor(Date.now()/1000-ts);
    if(s<60)return s+'s';
    if(s<3600)return Math.floor(s/60)+'m';
    if(s<86400)return Math.floor(s/3600)+'h';
    return Math.floor(s/86400)+'d';
  }

  function renderSessionsActive(){
    Array.prototype.forEach.call(sessionsList.children,function(el){
      el.classList.toggle('active', el.getAttribute('data-sid')===activeSid);
    });
  }

  var _sessionsFirstLoad=true;
  async function loadSessions(){
    try{
      var r=await fetch('/api/sessions'); var d=await r.json();
      sessionsList.innerHTML='';
      /*proj-filter*/var _ap=window.SilexUI.activeProject;
      var _slist=(d.sessions||[]).filter(function(s){ return _ap===null ? true : (s.project===_ap); });
      // Auto-restore: on first page load, open the most-recent session so the
      // conversation shows immediately (history is in Redis; this just displays it).
      if(_sessionsFirstLoad){
        _sessionsFirstLoad=false;
        if(!activeSid && (d.sessions||[]).length){
          var _recent=(d.sessions||[]).slice().sort(function(a,b){
            return (b.last_activity||0)-(a.last_activity||0);
          })[0];
          if(_recent && _recent.session_id){
            window.SilexChat.loadSession(_recent.session_id);
          }
        }
      }
      _slist.forEach(function(s){
        var item=document.createElement('div');
        item.className='side-item'; item.setAttribute('data-sid',s.session_id);
        if(s.session_id===activeSid)item.classList.add('active');
        var row=document.createElement('div'); row.className='side-item-row';
        var title=document.createElement('div'); title.className='side-item-title'; title.textContent=s.title||'Untitled';
        var actions=document.createElement('div'); actions.className='side-item-actions';
        var renameB=document.createElement('button'); renameB.innerHTML='✎'; renameB.title='Rename';
        var moveB=document.createElement('button'); moveB.innerHTML='📁'; moveB.title='Move to project';
        var delB=document.createElement('button'); delB.innerHTML='🗑'; delB.title='Delete';
        actions.appendChild(renameB); actions.appendChild(moveB); actions.appendChild(delB);
        row.appendChild(title); row.appendChild(actions);
        var meta=document.createElement('div'); meta.className='side-item-meta';
        meta.textContent=(s.turns||0)+' turns · '+timeago(s.last_activity);
        item.appendChild(row); item.appendChild(meta);

        item.addEventListener('click',function(e){
          if(e.target===renameB||e.target===delB)return;
          window.SilexChat.loadSession(s.session_id);
        });
        renameB.addEventListener('click',async function(e){
          e.stopPropagation();
          var nt=prompt('Rename conversation:',s.title||'');
          if(nt&&nt.trim()){ await fetch('/api/sessions/'+s.session_id+'/rename',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({title:nt.trim()})}); loadSessions(); }
        });
        /*move-to-project*/moveB.addEventListener('click',async function(e){
          e.stopPropagation();
          var opts=['0) None (remove from project)'];
          projectsCache.forEach(function(p,i){ opts.push((i+1)+') '+p.name); });
          var choice=prompt('Move "'+(s.title||'chat')+'" to which project?\n\n'+opts.join('\n')+'\n\nEnter a number:');
          if(choice===null)return;
          var n=parseInt(choice,10);
          var projectId=null;
          if(n>=1&&n<=projectsCache.length){ projectId=projectsCache[n-1].project_id; }
          else if(n!==0){ return; }
          await fetch('/api/sessions/'+s.session_id+'/project',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({project:projectId})});
          loadSessions();
        });
        delB.addEventListener('click',async function(e){
          e.stopPropagation();
          if(!confirm('Delete this conversation? This cannot be undone.'))return;
          await fetch('/api/sessions/'+s.session_id,{method:'DELETE'});
          if(activeSid===s.session_id)window.SilexChat.newChat();
          loadSessions();
        });
        sessionsList.appendChild(item);
      });
      if(!(d.sessions||[]).length){
        var empty=document.createElement('div'); empty.className='side-item-meta'; empty.style.padding='10px 14px';
        empty.textContent='No conversations yet'; sessionsList.appendChild(empty);
      }
    }catch(e){}
  }

  async function loadProjects(){
    try{
      var r=await fetch('/api/projects'); var d=await r.json();
      projectsCache=d.projects||[];
      projectsList.innerHTML='';
      // "All" pseudo-project
      var all=document.createElement('div'); all.className='proj-item'+(window.SilexUI.activeProject===null?' active':'');
      all.innerHTML='<span class="dot" style="background:var(--text-muted)"></span> All conversations';
      all.addEventListener('click',function(){ window.SilexUI.activeProject=null; loadProjects(); loadSessions(); });
      projectsList.appendChild(all);
      (d.projects||[]).forEach(function(p){
        var item=document.createElement('div'); item.className='proj-item'+(window.SilexUI.activeProject===p.project_id?' active':'');
        var label=document.createElement('span'); label.style.flex='1'; label.style.display='flex'; label.style.alignItems='center'; label.style.gap='6px';
        label.innerHTML='<span class="dot"></span> '+p.name;
        var plus=document.createElement('button');
        plus.textContent='+'; plus.title='New chat in '+p.name;
        plus.style.cssText='background:transparent;border:none;color:var(--text-muted);cursor:pointer;font-size:14px;line-height:1;padding:0 4px;';
        plus.addEventListener('mouseenter',function(){plus.style.color='var(--accent)';});
        plus.addEventListener('mouseleave',function(){plus.style.color='var(--text-muted)';});
        var delp=document.createElement('button');
        delp.textContent='×'; delp.title='Delete project '+p.name;
        delp.style.cssText='background:transparent;border:none;color:var(--text-muted);cursor:pointer;font-size:15px;line-height:1;padding:0 4px;';
        delp.addEventListener('mouseenter',function(){delp.style.color='var(--accent)';});
        delp.addEventListener('mouseleave',function(){delp.style.color='var(--text-muted)';});
        /*del-project*/delp.addEventListener('click',async function(e){
          e.stopPropagation();
          if(!confirm('Delete project "'+p.name+'"?\n\nConversations in it are NOT deleted — they just become unfiled. The project\'s memory collection is left intact.'))return;
          await fetch('/api/projects/'+p.project_id,{method:'DELETE'});
          if(window.SilexUI.activeProject===p.project_id){ window.SilexUI.activeProject=null; }
          loadProjects(); loadSessions();
        });
        item.style.display='flex'; item.style.alignItems='center';
        item.appendChild(label); item.appendChild(plus); item.appendChild(delp);
        label.addEventListener('click',function(){ window.SilexUI.activeProject=p.project_id; loadProjects(); loadSessions(); });
        /*proj-newchat*/plus.addEventListener('click',function(e){
          e.stopPropagation();
          window.SilexUI.activeProject=p.project_id;
          window.SilexChat.newChat();
          loadProjects();
        });
        projectsList.appendChild(item);
      });
    }catch(e){}
  }

  newChatBtn.addEventListener('click',function(){ window.SilexChat.newChat(); });
  newProjBtn.addEventListener('click',async function(){
    var name=prompt('New project name:');
    if(name&&name.trim()){ await fetch('/api/projects',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({name:name.trim()})}); loadProjects(); }
  });

  // initial load + periodic refresh of session list
  loadProjects(); loadSessions();
  setInterval(loadSessions, 15000);
})();

</script>
</body>
</html>
