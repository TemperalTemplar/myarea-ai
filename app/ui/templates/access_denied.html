<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Access Restricted — Silex</title>
<style>
  :root{--bg:#0d0f14;--bg2:#111520;--border:#1e2535;--accent:#e63946;--text:#e8eaf0;--text-dim:#8899bb;--text-muted:#4a5a7a;}
  *{box-sizing:border-box;margin:0;padding:0;}
  body{background:var(--bg);color:var(--text);font-family:'Courier New',monospace;min-height:100vh;display:flex;align-items:center;justify-content:center;}
  .wrap{max-width:480px;padding:40px;text-align:center;}
  .icon{font-size:48px;color:var(--accent);margin-bottom:24px;}
  h1{font-size:20px;font-weight:700;letter-spacing:3px;color:var(--accent);margin-bottom:12px;}
  p{font-size:13px;color:var(--text-dim);line-height:1.8;margin-bottom:20px;}
  .card{background:var(--bg2);border:1px solid var(--border);border-radius:6px;padding:20px;margin-bottom:20px;font-size:12px;color:var(--text-muted);line-height:1.8;}
  a{color:var(--accent);text-decoration:none;}
</style>
</head>
<body>
<div class="wrap">
  <div class="icon">&#11041;</div>
  <h1>ACCESS RESTRICTED</h1>
  <p>The Silex AI system is restricted to authorized users only.</p>
  <div class="card">
    Access to this system requires explicit approval from the platform architect.<br><br>
    If you believe you should have access, please contact Alva directly.
  </div>
  <a href="/auth/logout">Return to login</a>
</div>
</body>
</html>
