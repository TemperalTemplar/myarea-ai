<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sparta | MyArea Security</title>
  <link rel="icon" type="image/x-icon" href="https://apps.wrds361.com/static/favicon.ico">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Space+Mono:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.3/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap-icons/1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <style>
    :root {
      --bg:#0d0f14; --bg2:#111520; --bg3:#161b28;
      --border:#1e2535; --border2:#2a3448;
      --accent:#e63946; --accent2:#ff4d5a;
      --text:#e8eaf0; --text-dim:#8899bb; --text-muted:#4a5a7a;
      --font-mono:'Space Mono','Courier New',monospace;
      --green:#00d4a0; --yellow:#f59e0b; --purple:#7c3aed; --cyan:#06b6d4;
    }
    [data-theme="light"] { --bg:#f0f2f5; --bg2:#fff; --bg3:#e8eaed; --border:#dde1e7; --border2:#c8cdd6; --text:#111520; --text-dim:#444c5e; --text-muted:#7a8499; }
    [data-theme="high-contrast"] { --bg:#000; --bg2:#0a0a0a; --bg3:#111; --border:#fff; --border2:#fff; --text:#fff; --text-dim:#ccc; --text-muted:#888; }
    *,*::before,*::after { box-sizing:border-box; margin:0; padding:0; }
    html,body { background:var(--bg); color:var(--text); font-family:var(--font-mono); font-size:14px; line-height:1.6; }
    a { color:var(--accent); text-decoration:none; }
    ::-webkit-scrollbar { width:6px; } ::-webkit-scrollbar-track { background:var(--bg2); } ::-webkit-scrollbar-thumb { background:var(--border2); border-radius:3px; }

    .ma-nav { background:var(--bg2); border-bottom:1px solid var(--border2); position:sticky; top:0; z-index:1000; }
    .ma-nav-inner { display:flex; align-items:center; gap:12px; max-width:1200px; margin:0 auto; padding:0 16px; height:52px; }
    .ma-logo { font-family:var(--font-mono); font-size:16px; font-weight:700; letter-spacing:3px; color:var(--accent); text-decoration:none; }
    .ma-logo span { color:var(--text-dim); }
    .ma-nav-links { display:flex; align-items:center; gap:2px; flex:1; }
    .ma-nav-link { display:flex; align-items:center; gap:6px; padding:6px 10px; border-radius:6px; font-size:12px; color:var(--text-dim); text-decoration:none; transition:all .15s; }
    .ma-nav-link:hover,.ma-nav-link.active { background:rgba(230,57,70,.08); color:var(--text); }
    .ma-nav-right { display:flex; align-items:center; gap:6px; margin-left:auto; }
    .ma-icon-btn { background:transparent; border:1px solid var(--border2); border-radius:6px; width:36px; height:36px; cursor:pointer; display:flex; align-items:center; justify-content:center; color:var(--text-dim); font-size:15px; transition:all .15s; font-family:var(--font-mono); }
    .ma-icon-btn:hover { border-color:var(--accent); color:var(--text); }

    .ma-main { max-width:900px; margin:0 auto; padding:20px 16px; }

    #auth-gate { text-align:center; padding:60px 20px; }
    #auth-gate h2 { font-size:16px; letter-spacing:2px; color:var(--text-dim); margin-bottom:16px; }
    #token-input { background:var(--bg3); border:1px solid var(--border2); color:var(--text); font-family:var(--font-mono); font-size:13px; padding:10px 14px; border-radius:6px; width:100%; max-width:400px; outline:none; margin-bottom:12px; display:block; margin-left:auto; margin-right:auto; }
    #token-input:focus { border-color:var(--accent); }
    #auth-btn { background:var(--accent); border:none; color:#fff; font-family:var(--font-mono); font-size:12px; padding:10px 24px; border-radius:6px; cursor:pointer; letter-spacing:.1em; text-transform:uppercase; }
    #auth-error { color:var(--accent); font-size:12px; margin-top:8px; display:none; }

    #security-view { display:none; }

    #security-header { display:flex; align-items:center; gap:12px; margin-bottom:20px; padding-bottom:16px; border-bottom:1px solid var(--border); flex-wrap:wrap; }
    #security-header h1 { font-size:18px; letter-spacing:2px; }
    #security-header h1 span { color:var(--accent); }

    .scan-btn { background:transparent; border:1px solid var(--border2); color:var(--text-dim); font-family:var(--font-mono); font-size:11px; padding:6px 14px; border-radius:6px; cursor:pointer; letter-spacing:.08em; text-transform:uppercase; transition:all .15s; margin-left:auto; }
    .scan-btn:hover { border-color:var(--accent); color:var(--accent); }
    .scan-btn:disabled { opacity:.4; cursor:not-allowed; }

    .filter-bar { display:flex; gap:8px; margin-bottom:16px; flex-wrap:wrap; }
    .filter-btn { background:transparent; border:1px solid var(--border2); color:var(--text-muted); font-family:var(--font-mono); font-size:10px; padding:4px 10px; border-radius:4px; cursor:pointer; letter-spacing:.08em; text-transform:uppercase; transition:all .15s; }
    .filter-btn:hover { border-color:var(--accent); color:var(--text); }
    .filter-btn.active { border-color:var(--accent); color:var(--accent); background:rgba(230,57,70,.06); }

    .security-entry { background:var(--bg2); border:1px solid var(--border); border-radius:8px; padding:16px; margin-bottom:12px; animation:fadein .2s ease; }
    @keyframes fadein { from{opacity:0;transform:translateY(4px)} to{opacity:1;transform:none} }
    .security-entry.critical { border-left:3px solid var(--accent); }
    .security-entry.warning  { border-left:3px solid var(--yellow); }
    .security-entry.info     { border-left:3px solid var(--border2); }

    .entry-meta { display:flex; align-items:center; gap:10px; margin-bottom:10px; font-size:10px; color:var(--text-muted); letter-spacing:.08em; flex-wrap:wrap; }
    .severity-badge { padding:1px 7px; border-radius:3px; font-size:9px; letter-spacing:.1em; text-transform:uppercase; font-weight:700; }
    .severity-badge.critical { background:rgba(230,57,70,.15); border:1px solid var(--accent); color:var(--accent); }
    .severity-badge.warning  { background:rgba(245,158,11,.12); border:1px solid var(--yellow); color:var(--yellow); }
    .severity-badge.info     { background:rgba(42,52,72,.5); border:1px solid var(--border2); color:var(--text-muted); }
    .shareable-badge { padding:1px 6px; border-radius:3px; font-size:9px; letter-spacing:.1em; text-transform:uppercase; }
    .shareable-badge.yes { background:rgba(0,212,160,.1); border:1px solid var(--green); color:var(--green); }

    .entry-content { font-size:12px; line-height:1.8; color:var(--text); white-space:pre-wrap; word-break:break-word; font-family:var(--font-mono); }

    #scan-result { background:var(--bg3); border:1px solid var(--border2); border-radius:6px; padding:12px 16px; margin-bottom:16px; font-size:12px; display:none; }
    #scan-result.critical { border-color:var(--accent); color:var(--accent); }
    #scan-result.warning  { border-color:var(--yellow); color:var(--yellow); }
    #scan-result.ok       { border-color:var(--green); color:var(--green); }

    #load-more { display:block; width:100%; background:transparent; border:1px solid var(--border2); color:var(--text-dim); font-family:var(--font-mono); font-size:12px; padding:10px; border-radius:6px; cursor:pointer; margin-top:8px; transition:all .15s; }
    #load-more:hover { border-color:var(--accent); color:var(--text); }
    #empty-state { text-align:center; padding:40px; color:var(--text-muted); font-size:13px; }
    #loading { text-align:center; padding:40px; color:var(--text-muted); font-size:12px; letter-spacing:.1em; }
  </style>
</head>
<body>

<nav class="ma-nav">
  <div class="ma-nav-inner">
    <a href="https://apps.wrds361.com" class="ma-logo">MY<span>AREA</span></a>
    <div class="ma-nav-links">
      <a href="/" class="ma-nav-link"><i class="bi bi-cpu-fill"></i> Silex</a>
      <a href="/journal" class="ma-nav-link"><i class="bi bi-journal-text"></i> Journal</a>
      <a href="/security" class="ma-nav-link active"><i class="bi bi-shield-shaded"></i> Sparta</a>
    </div>
    <div class="ma-nav-right">
      <button onclick="toggleTheme()" id="ma-theme-btn" class="ma-icon-btn" title="Toggle theme">&#9790;</button>
      <button onclick="toggleContrast()" class="ma-icon-btn" title="High contrast" style="font-size:10px;letter-spacing:1px;width:auto;padding:0 8px;">HC</button>

      <!-- User -->
      <div style="position:relative;display:inline-block" id="userWrap">
        <button class="ma-icon-btn" id="userBtn" style="width:auto;padding:0 10px;gap:6px;font-size:12px;">
          <i class="bi bi-person-fill"></i>
          <span id="user-display">...</span>
          <i class="bi bi-chevron-down" style="font-size:9px;"></i>
        </button>
        <div id="userDrop" style="display:none;position:absolute;top:calc(100% + 8px);right:0;min-width:160px;background:#1a2030;border:1px solid #2a3448;border-radius:8px;z-index:9999;padding:6px 0;">
          <div style="padding:8px 14px;font-size:11px;color:#8899bb;border-bottom:1px solid #2a3448;" id="user-email">—</div>
          <a href="/auth/logout" style="display:flex;align-items:center;gap:8px;padding:8px 14px;font-size:12px;color:#e63946;text-decoration:none;font-family:'Space Mono',monospace;">
            <i class="bi bi-box-arrow-right"></i> Logout
          </a>
        </div>
      </div>
    </div>
  </div>
</nav>

<main class="ma-main">

  <div id="auth-gate">
    <h2>// SPARTA SECURITY JOURNAL //</h2>
    <p style="font-size:12px;color:var(--text-muted);margin-bottom:24px;">CSSHI access required</p>
    <input type="password" id="token-input" placeholder="enter csshi token">
    <button id="auth-btn" onclick="authenticate()">ACCESS</button>
    <div id="auth-error">invalid token or access denied</div>
  </div>

  <div id="security-view">
    <div id="security-header">
      <h1><span>SPARTA</span> // SECURITY JOURNAL</h1>
      <button class="scan-btn" id="scan-btn" onclick="triggerScan()">⚡ RUN SCAN NOW</button>
    </div>

    <div id="scan-result"></div>

    <div class="filter-bar">
      <button class="filter-btn active" onclick="setFilter('all', this)">ALL</button>
      <button class="filter-btn" onclick="setFilter('critical', this)">CRITICAL</button>
      <button class="filter-btn" onclick="setFilter('warning', this)">WARNING</button>
      <button class="filter-btn" onclick="setFilter('info', this)">INFO</button>
    </div>

    <div id="loading">loading scan history…</div>
    <div id="entries"></div>
    <div id="empty-state" style="display:none">no scan results yet — Sparta will scan on schedule or trigger manually above</div>
    <button id="load-more" style="display:none" onclick="loadMore()">load more</button>
  </div>

</main>

<script>
var csshiToken = localStorage.getItem('silex_csshi_token') || '';
var offset = 0;
var limit  = 20;
var currentFilter = 'all';

if(csshiToken) authenticate();

function authenticate() {
  var t = document.getElementById('token-input').value.trim() || csshiToken;
  if(!t) return;
  fetch('/api/security-journal?limit=1', {
    headers: {'Authorization': 'Bearer ' + t, 'X-Silex-Tier': 'csshi'}
  }).then(function(r) {
    if(r.ok) {
      csshiToken = t;
      localStorage.setItem('silex_csshi_token', t);
      document.getElementById('auth-gate').style.display   = 'none';
      document.getElementById('security-view').style.display = 'block';
      loadEntries();
    } else {
      document.getElementById('auth-error').style.display = 'block';
      localStorage.removeItem('silex_csshi_token');
    }
  }).catch(function() { document.getElementById('auth-error').style.display = 'block'; });
}

function setFilter(f, btn) {
  currentFilter = f;
  document.querySelectorAll('.filter-btn').forEach(function(b) { b.classList.remove('active'); });
  btn.classList.add('active');
  loadEntries();
}

function loadEntries() {
  offset = 0;
  document.getElementById('entries').innerHTML = '';
  document.getElementById('loading').style.display = 'block';
  document.getElementById('empty-state').style.display = 'none';
  fetchEntries();
}

function loadMore() { fetchEntries(); }

function fetchEntries() {
  var url = '/api/security-journal?limit=' + limit + '&offset=' + offset;
  if(currentFilter !== 'all') url += '&severity=' + currentFilter;

  fetch(url, { headers: {'Authorization': 'Bearer ' + csshiToken, 'X-Silex-Tier': 'csshi'} })
  .then(function(r) { return r.json(); })
  .then(function(d) {
    document.getElementById('loading').style.display = 'none';
    var entries = d.entries || [];
    var container = document.getElementById('entries');

    if(offset === 0 && entries.length === 0) {
      document.getElementById('empty-state').style.display = 'block';
      return;
    }

    entries.forEach(function(e) {
      var el = document.createElement('div');
      el.className = 'security-entry ' + (e.severity || 'info');
      var ts = e.timestamp ? new Date(e.timestamp).toLocaleString() : '—';
      var shareHtml = e.shareable ? '<span class="shareable-badge yes">shareable</span>' : '';
      var temp = e.gpu_temp ? e.gpu_temp + '°C' : '—';
      var trigger = e.triggered_by || 'schedule';

      el.innerHTML = '<div class="entry-meta">' +
        '<span class="severity-badge ' + (e.severity||'info') + '">' + (e.severity||'info') + '</span>' +
        shareHtml +
        '<span>' + ts + '</span>' +
        '<span><i class="bi bi-gpu-card"></i> ' + temp + '</span>' +
        '<span>' + trigger + '</span>' +
        '</div>' +
        '<div class="entry-content">' + escHtml(e.content) + '</div>';
      container.appendChild(el);
    });

    offset += entries.length;
    document.getElementById('load-more').style.display = entries.length === limit ? 'block' : 'none';
  })
  .catch(function(e) { document.getElementById('loading').style.display = 'none'; console.error(e); });
}

function triggerScan() {
  var btn = document.getElementById('scan-btn');
  var result = document.getElementById('scan-result');
  btn.disabled = true;
  btn.textContent = 'SCANNING…';
  result.style.display = 'none';

  fetch('/api/sparta/scan', {
    method: 'POST',
    headers: {'Authorization': 'Bearer ' + csshiToken, 'X-Silex-Tier': 'csshi', 'Content-Type': 'application/json'}
  })
  .then(function(r) { return r.json(); })
  .then(function(d) {
    btn.disabled = false;
    btn.textContent = '⚡ RUN SCAN NOW';
    result.style.display = 'block';
    if(d.skipped) {
      result.className = 'warning';
      result.textContent = 'Scan skipped: ' + d.reason + (d.gpu_temp ? ' (GPU: ' + d.gpu_temp + '°C)' : '');
    } else {
      var cls = d.critical > 0 ? 'critical' : d.warnings > 0 ? 'warning' : 'ok';
      result.className = cls;
      result.textContent = 'Scan complete — ' + (d.scans_run||[]).join(', ') +
        ' | critical: ' + (d.critical||0) + ' | warnings: ' + (d.warnings||0) +
        ' | GPU: ' + (d.gpu_temp||'?') + '°C';
      loadEntries();
    }
  })
  .catch(function(e) {
    btn.disabled = false;
    btn.textContent = '⚡ RUN SCAN NOW';
    result.style.display = 'block';
    result.className = 'critical';
    result.textContent = 'Scan failed: ' + e.message;
  });
}

function escHtml(t) { return t.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
document.getElementById('token-input').addEventListener('keydown', function(e) { if(e.key==='Enter') authenticate(); });

function toggleTheme() {
  var cur=document.documentElement.getAttribute('data-theme');
  var btn=document.getElementById('ma-theme-btn');
  if(cur==='light'){document.documentElement.removeAttribute('data-theme');localStorage.removeItem('ma_theme');if(btn)btn.innerHTML='&#9790;';}
  else{document.documentElement.setAttribute('data-theme','light');localStorage.setItem('ma_theme','light');if(btn)btn.innerHTML='&#9788;';}
}
function toggleContrast(){
  var cur=document.documentElement.getAttribute('data-theme');
  if(cur==='high-contrast'){document.documentElement.removeAttribute('data-theme');localStorage.removeItem('ma_theme');}
  else{document.documentElement.setAttribute('data-theme','high-contrast');localStorage.setItem('ma_theme','high-contrast');}
}
(function(){
  var t=localStorage.getItem('ma_theme');
  if(t)document.documentElement.setAttribute('data-theme',t);
  var btn=document.getElementById('ma-theme-btn');
  if(btn&&t==='light')btn.innerHTML='&#9788;';
})();

// User session
(function(){
  fetch('/auth/me').then(function(r){return r.json();}).then(function(d){
    if(d.authenticated){
      document.getElementById('user-display').textContent = d.user.username || d.user.name || 'user';
      document.getElementById('user-email').textContent = d.user.email || '';
    } else {
      window.location.href = '/auth/login';
    }
  }).catch(function(){ window.location.href = '/auth/login'; });
  var btn=document.getElementById('userBtn');
  var dd=document.getElementById('userDrop');
  if(btn&&dd){
    btn.addEventListener('click',function(e){e.stopPropagation();dd.style.display=dd.style.display==='block'?'none':'block';});
    document.addEventListener('click',function(){if(dd)dd.style.display='none';});
  }
})();
</script>
</body>
</html>
